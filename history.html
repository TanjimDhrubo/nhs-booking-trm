<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="TRM">
  <title>NHS Booking | TRM</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      font-size: 13px;
      padding: 7px 18px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">NHS</div>
      <span class="navbar-name">NHS Appointment Booking <span>| TRM</span></span>
    </a>
    <div class="navbar-links">
      <span class="navbar-user" id="user-name"></span>
      <a href="dashboard.html" class="btn-ghost">&larr; Dashboard</a>
      <button class="btn-ghost" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container">

    <div class="page-header">
      <h1>Appointment History</h1>
      <p>All your NHS appointments</p>
    </div>

    <div id="message"></div>

    <div class="filter-row">
      <button class="btn-primary filter-btn" id="filter-all">All</button>
      <button class="btn-secondary filter-btn" id="filter-upcoming">Upcoming</button>
      <button class="btn-secondary filter-btn" id="filter-past">Past</button>
      <button class="btn-secondary filter-btn" id="filter-cancelled">Cancelled</button>
    </div>

    <div id="history-list">
      <div class="loading">Loading</div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2026 NHS Appointment Booking System</span>
    <span>·</span>
    <span class="footer-trm">Developed by TRM</span>
    <span>·</span>
    <a href="privacy.html">Privacy Policy</a>
  </footer>

  <!-- TRM WATERMARK -->
  <div class="trm-watermark">Developed by TRM</div>

  <script type="module">
    import { supabase } from './js/supabase.js'
    import { requireAuth, showUserName, logout } from './js/auth.js'

    let allAppointments = []
    let userId = null

    const listEl = document.getElementById('history-list')
    const msgEl = document.getElementById('message')

    const filterAll = document.getElementById('filter-all')
    const filterUpcoming = document.getElementById('filter-upcoming')
    const filterPast = document.getElementById('filter-past')
    const filterCancelled = document.getElementById('filter-cancelled')

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric',
        month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      })
    }

    function renderBadge(status) {
      const cls = 'badge badge-' + status.replace('_', '').toLowerCase()
      const label = status.charAt(0).toUpperCase() + status.slice(1).replace('_', ' ')
      return '<span class="' + cls + '">' + label + '</span>'
    }

    function showMsg(msg, type = 'error') {
      msgEl.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>'
    }

    function setActiveFilter(active) {
      const btns = [filterAll, filterUpcoming, filterPast, filterCancelled]
      for (const b of btns) {
        b.className = b === active ? 'btn-primary filter-btn' : 'btn-secondary filter-btn'
      }
    }

    function renderHistory(appointments) {
      if (!appointments.length) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&#x1F5D3;&#xFE0F;</div>
            <p>No appointments to show.</p>
            <a href="book.html" class="btn-primary">Book Now</a>
          </div>`
        return
      }

      let html = '<div class="table-wrap"><table><thead><tr><th>Date &amp; Time</th><th>Doctor</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>'

      const now = new Date()

      for (const a of appointments) {
        const doc = a.doctors_trm
        const docName = doc ? 'Dr. ' + doc.name : 'Unknown'
        const apptDate = new Date(a.appointment_date)
        const isFuture = apptDate > now && a.status === 'confirmed'
        const isPastOrCancelled = apptDate < now || a.status === 'cancelled'

        let actions = '<span class="appt-email">&mdash;</span>'
        if (isFuture) {
          actions = '<a href="reschedule.html?appointment_id=' + a.id + '" class="btn-secondary btn-sm">Reschedule</a>'
          actions += '<button class="btn-danger btn-sm cancel-btn" data-id="' + a.id + '" data-date="' + a.appointment_date + '">Cancel</button>'
        }

        html += '<tr>'
        html += '<td>' + formatDate(a.appointment_date) + '</td>'
        html += '<td>' + docName + '</td>'
        html += '<td>' + a.appointment_type + '</td>'
        html += '<td>' + renderBadge(a.status) + '</td>'
        html += '<td><div class="appt-actions">' + actions + '</div></td>'
        html += '</tr>'
      }

      html += '</tbody></table></div>'
      listEl.innerHTML = html

      document.querySelectorAll('.cancel-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id
          const date = btn.dataset.date

          if (!confirm('Cancel this appointment?')) return

          const { error } = await supabase
            .from('appointments_trm')
            .update({ status: 'cancelled' })
            .eq('id', id)

          if (error) {
            showMsg('Failed to cancel appointment.')
            return
          }

          await supabase.from('notifications_trm').insert({
            user_id: userId,
            message: 'Your appointment on ' + formatDate(date) + ' has been cancelled',
            type: 'in-app'
          })

          showMsg('Appointment cancelled.', 'success')

          await fetchAndRender()
        })
      })
    }

    function applyFilter(filter) {
      setActiveFilter(filter)

      const now = new Date()

      if (filter === filterAll) {
        renderHistory(allAppointments)
      } else if (filter === filterUpcoming) {
        renderHistory(allAppointments.filter(a =>
          new Date(a.appointment_date) > now && a.status === 'confirmed'
        ))
      } else if (filter === filterPast) {
        renderHistory(allAppointments.filter(a =>
          new Date(a.appointment_date) < now
        ))
      } else if (filter === filterCancelled) {
        renderHistory(allAppointments.filter(a =>
          a.status === 'cancelled'
        ))
      }
    }

    async function fetchAndRender() {
      listEl.innerHTML = '<div class="loading">Loading</div>'

      const { data: appts, error } = await supabase
        .from('appointments_trm')
        .select('*, doctors_trm(name, specialisation)')
        .eq('user_id', userId)
        .order('appointment_date', { ascending: false })

      if (error) {
        listEl.innerHTML = '<div class="alert alert-error">Failed to load appointments.</div>'
        return
      }

      allAppointments = appts || []
      applyFilter(filterAll)
    }

    async function init() {
      const session = await requireAuth()
      if (!session) return

      userId = session.user.id
      await showUserName('user-name')

      filterAll.addEventListener('click', () => applyFilter(filterAll))
      filterUpcoming.addEventListener('click', () => applyFilter(filterUpcoming))
      filterPast.addEventListener('click', () => applyFilter(filterPast))
      filterCancelled.addEventListener('click', () => applyFilter(filterCancelled))

      await fetchAndRender()
    }

    document.getElementById('logout-btn').addEventListener('click', logout)

    init()
  </script>

</body>
</html>
