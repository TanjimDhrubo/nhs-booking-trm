<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="TRM">
  <title>NHS Booking | TRM</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-nav-name span {
      color: var(--nhs-blue);
    }

    .admin-staff-badge {
      display: inline-block;
      background: #FFF8E7;
      color: #856404;
      border: 1px solid #FFE69C;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-left: 8px;
      vertical-align: middle;
    }

    .admin-amber-bar {
      height: 3px;
      background: var(--nhs-amber);
      width: 100%;
    }

    .greeting-large {
      font-size: 28px;
      font-weight: 700;
      color: var(--nhs-dark);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .greeting-spec {
      font-size: 15px;
      color: var(--nhs-muted);
      margin-bottom: 20px;
    }

    .stat-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stat-chip {
      background: var(--bg-subtle);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 4px;
      color: var(--nhs-dark);
    }

    .stat-chip strong {
      color: var(--nhs-blue);
      font-size: 15px;
    }

    .section-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--nhs-dark);
      letter-spacing: -0.4px;
      margin-bottom: 16px;
    }

    .appt-email {
      font-size: 12px;
      color: var(--nhs-muted);
    }

    #message {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="admin-dashboard.html" class="navbar-brand">
      <div class="navbar-logo">NHS</div>
      <span class="navbar-name admin-nav-name">NHS Admin Portal <span>| TRM</span></span>
      <span class="admin-staff-badge">STAFF ONLY</span>
    </a>
    <div class="navbar-links">
      <span class="navbar-user" id="doctor-name"></span>
      <button class="btn-ghost" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <!-- AMBER ACCENT BAR -->
  <div class="admin-amber-bar"></div>

  <!-- MAIN CONTENT -->
  <main class="container">

    <div id="message"></div>

    <!-- WELCOME CARD -->
    <div class="card">
      <div class="greeting-large" id="greeting">Good morning</div>
      <div class="greeting-spec" id="doctor-spec"></div>
      <div class="stat-chips">
        <div class="stat-chip"><strong id="stat-today">0</strong> appointments today</div>
        <div class="stat-chip"><strong id="stat-week">0</strong> this week</div>
        <div class="stat-chip"><strong id="stat-total">0</strong> total appointments</div>
      </div>
    </div>

    <!-- TODAY'S APPOINTMENTS -->
    <h2 class="section-heading" id="today-heading">Today's Appointments</h2>
    <div id="today-appointments">
      <div class="loading">Loading</div>
    </div>

    <div class="divider"></div>

    <!-- THIS WEEK -->
    <h2 class="section-heading">This Week</h2>
    <div id="week-appointments">
      <div class="loading">Loading</div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2026 NHS Appointment Booking System</span>
    <span>·</span>
    <span class="footer-trm">Developed by TRM</span>
    <span>·</span>
    <a href="privacy.html">Privacy Policy</a>
  </footer>

  <!-- TRM WATERMARK -->
  <div class="trm-watermark">Developed by TRM</div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    let doctorId = null
    let doctorName = ''

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric',
        month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      })
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString('en-GB', {
        hour: '2-digit', minute: '2-digit'
      })
    }

    function getDateStr(date) {
      return date.toISOString().slice(0, 10)
    }

    function getDayBounds(date) {
      const start = new Date(date)
      start.setHours(0, 0, 0, 0)
      const end = new Date(date)
      end.setHours(23, 59, 59, 999)
      return { start: start.toISOString(), end: end.toISOString() }
    }

    async function loadDoctorProfile() {
      const { data: { session }, error: sessionErr } = await supabase.auth.getSession()
      if (sessionErr || !session) {
        window.location.href = 'admin-login.html'
        return null
      }

      const email = session.user.email
      const { data: doctor, error: docErr } = await supabase
        .from('doctors_trm')
        .select('id, name, specialisation')
        .eq('email', email)
        .single()

      if (docErr || !doctor) {
        await supabase.auth.signOut()
        window.location.href = 'admin-login.html'
        return null
      }

      doctorId = doctor.id
      doctorName = doctor.name

      document.getElementById('doctor-name').textContent = doctor.name
      document.getElementById('doctor-spec').textContent = doctor.specialisation

      const hour = new Date().getHours()
      let greeting = 'Good evening'
      if (hour < 12) greeting = 'Good morning'
      else if (hour < 17) greeting = 'Good afternoon'
      document.getElementById('greeting').textContent = greeting + ', ' + doctor.name

      return doctor
    }

    function renderStatusBadge(status) {
      const cls = 'badge badge-' + status.replace('_', '').toLowerCase()
      return '<span class="' + cls + '">' + status.charAt(0).toUpperCase() + status.slice(1).replace('_', ' ') + '</span>'
    }

    async function loadTodayAppointments() {
      const el = document.getElementById('today-appointments')
      el.innerHTML = '<div class="loading">Loading</div>'

      const now = new Date()
      const { start, end } = getDayBounds(now)

      const { data: appts, error } = await supabase
        .from('appointments_trm')
        .select('*, profiles_trm(full_name)')
        .eq('doctor_id', doctorId)
        .gte('appointment_date', start)
        .lte('appointment_date', end)
        .order('appointment_date')

      if (error) {
        el.innerHTML = '<div class="alert alert-error">Failed to load appointments.</div>'
        return
      }

      document.getElementById('stat-today').textContent = appts.length

      if (!appts.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&#x1F4C5;</div>
            <p>No appointments scheduled for today. Enjoy your day! &#x1F31F;</p>
          </div>`
        return
      }

      let html = '<div class="table-wrap"><table><thead><tr><th>Time</th><th>Patient Name</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>'

      for (const a of appts) {
        const patientName = a.profiles_trm?.full_name || 'Unknown'
        const status = renderStatusBadge(a.status)
        const canComplete = a.status === 'confirmed' || a.status === 'checked_in'
        const actions = canComplete
          ? '<button class="btn-secondary btn-sm mark-complete" data-id="' + a.id + '">Mark Complete</button>'
          : '<span class="appt-email">—</span>'

        html += '<tr>'
        html += '<td>' + formatTime(a.appointment_date) + '</td>'
        html += '<td>' + patientName + '</td>'
        html += '<td>' + a.appointment_type + '</td>'
        html += '<td>' + status + '</td>'
        html += '<td>' + actions + '</td>'
        html += '</tr>'
      }

      html += '</tbody></table></div>'
      el.innerHTML = html

      document.querySelectorAll('.mark-complete').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id
          const { error: updErr } = await supabase
            .from('appointments_trm')
            .update({ status: 'completed' })
            .eq('id', id)

          if (updErr) {
            document.getElementById('message').innerHTML =
              '<div class="alert alert-error">Failed to update appointment.</div>'
            return
          }

          document.getElementById('message').innerHTML =
            '<div class="alert alert-success">Appointment marked as complete.</div>'

          await loadTodayAppointments()
          await loadWeekAppointments()
          await loadStats()
        })
      })
    }

    async function loadWeekAppointments() {
      const el = document.getElementById('week-appointments')
      el.innerHTML = '<div class="loading">Loading</div>'

      const today = new Date()
      const tomorrow = new Date(today)
      tomorrow.setDate(tomorrow.getDate() + 1)
      const weekEnd = new Date(today)
      weekEnd.setDate(weekEnd.getDate() + 7)
      weekEnd.setHours(23, 59, 59, 999)

      const { data: appts, error } = await supabase
        .from('appointments_trm')
        .select('*, profiles_trm(full_name)')
        .eq('doctor_id', doctorId)
        .gte('appointment_date', tomorrow.toISOString())
        .lte('appointment_date', weekEnd.toISOString())
        .order('appointment_date')

      if (error) {
        el.innerHTML = '<div class="alert alert-error">Failed to load week appointments.</div>'
        return
      }

      document.getElementById('stat-week').textContent = appts.length

      if (!appts.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&#x1F4C5;</div>
            <p>No upcoming appointments this week.</p>
          </div>`
        return
      }

      let html = '<div class="table-wrap"><table><thead><tr><th>Date &amp; Time</th><th>Patient Name</th><th>Type</th><th>Status</th></tr></thead><tbody>'

      for (const a of appts) {
        const patientName = a.profiles_trm?.full_name || 'Unknown'
        const status = renderStatusBadge(a.status)
        html += '<tr>'
        html += '<td>' + formatDate(a.appointment_date) + '</td>'
        html += '<td>' + patientName + '</td>'
        html += '<td>' + a.appointment_type + '</td>'
        html += '<td>' + status + '</td>'
        html += '</tr>'
      }

      html += '</tbody></table></div>'
      el.innerHTML = html
    }

    async function loadStats() {
      const { count, error } = await supabase
        .from('appointments_trm')
        .select('id', { count: 'exact', head: true })
        .eq('doctor_id', doctorId)

      if (!error) {
        document.getElementById('stat-total').textContent = count || 0
      }
    }

    async function init() {
      const doctor = await loadDoctorProfile()
      if (!doctor) return

      const today = new Date()
      const headingEl = document.getElementById('today-heading')
      headingEl.textContent = "Today's Appointments — " + today.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      })

      await Promise.all([
        loadTodayAppointments(),
        loadWeekAppointments(),
        loadStats()
      ])
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.href = 'admin-login.html'
    })

    init()
  </script>

</body>
</html>
