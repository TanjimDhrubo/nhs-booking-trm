<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="TRM">
  <title>NHS Booking | TRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <main class="container-sm">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <div class="navbar-logo">NHS</div>
        </a>
        <h1>Create Account</h1>
        <p>Register for NHS Appointment Booking</p>
      </div>

      <div id="message"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="full-name">Full Name</label>
          <input type="text" id="full-name" required placeholder="e.g. Jane Smith">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters">
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required>
        </div>

        <div class="form-group">
          <label for="nhs-number">NHS Number (optional)</label>
          <input type="text" id="nhs-number" placeholder="10-digit NHS number" pattern="[0-9]{10}" maxlength="10">
        </div>

        <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2026 NHS Appointment Booking System</span>
    <span>·</span>
    <span class="footer-trm">Developed by TRM</span>
    <span>·</span>
    <a href="privacy.html">Privacy Policy</a>
  </footer>

  <div class="trm-watermark">Developed by TRM</div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const form = document.getElementById('register-form')

    form.addEventListener('submit', async function(e) {
      e.preventDefault()
      
      const fullName = document.getElementById('full-name').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const dob = document.getElementById('dob').value
      const nhsNumber = document.getElementById('nhs-number').value.trim()
      const msgDiv = document.getElementById('message')
      const submitBtn = form.querySelector('button[type=submit]')

      // Validate
      if (!fullName || !email || !password || !dob) {
        msgDiv.innerHTML = '<div class="alert alert-error">Please fill in all required fields.</div>'
        return
      }

      if (password.length < 8) {
        msgDiv.innerHTML = '<div class="alert alert-error">Password must be at least 8 characters.</div>'
        return
      }

      // Loading state
      submitBtn.disabled = true
      submitBtn.textContent = 'Creating account...'
      msgDiv.innerHTML = ''

      try {
        // Step 1 — Create auth account
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName }
          }
        })

        if (authError) {
          msgDiv.innerHTML = `<div class="alert alert-error">${authError.message}</div>`
          submitBtn.disabled = false
          submitBtn.textContent = 'Create Account'
          return
        }

        if (!authData.user) {
          msgDiv.innerHTML = '<div class="alert alert-error">Signup failed. Please try again.</div>'
          submitBtn.disabled = false
          submitBtn.textContent = 'Create Account'
          return
        }

        // Step 2 — Insert profile using service role workaround
        // Wait a moment for auth to propagate
        await new Promise(resolve => setTimeout(resolve, 1000))

        const { error: profileError } = await supabase
          .from('profiles_trm')
          .upsert({
            id: authData.user.id,
            full_name: fullName,
            date_of_birth: dob || null,
            nhs_number: nhsNumber || null
          }, {
            onConflict: 'id'
          })

        if (profileError) {
          console.error('Profile error:', profileError)
          // Still show success — trigger will handle profile
          msgDiv.innerHTML = '<div class="alert alert-success">Account created successfully! Please check your email to verify your account, then sign in.</div>'
        } else {
          msgDiv.innerHTML = '<div class="alert alert-success">Account created successfully! Please check your email to verify your account, then sign in.</div>'
        }

        submitBtn.textContent = 'Account Created!'
        
      } catch (err) {
        console.error('Unexpected error:', err)
        msgDiv.innerHTML = '<div class="alert alert-error">An unexpected error occurred. Please try again.</div>'
        submitBtn.disabled = false
        submitBtn.textContent = 'Create Account'
      }
    })
  </script>

</body>
</html>
